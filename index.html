<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
        }

        .container{
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 300px;
        }

        input{
            width: 90%;
            padding: 10px;
            font-size: 16px;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        h2{
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Weather App</h1>

        <input type="text" id="cityInput" placeholder="Enter city name">

        <br><br>

        <button id="searchBtn">Search</button>

        <h2 id="cityName"></h2>
        <p id="temperature"></p>
        <p id="description"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
